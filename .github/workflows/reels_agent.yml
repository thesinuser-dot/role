name: Reels AI Hunter

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      pause_for_desktop:
        description: "Pause before agent so you can open the desktop first (yes/no)"
        required: false
        default: "yes"
      min_views:
        description: "Minimum view count"
        required: false
        default: "50000"
      max_reels:
        description: "Max reels to send"
        required: false
        default: "5"
      tiktok_enabled:
        description: "Auto-post to TikTok (true/false)"
        required: false
        default: "false"

env:
  MIN_VIEWS:               ${{ github.event.inputs.min_views  || '50000' }}
  MAX_QUALIFIED_SEND:      ${{ github.event.inputs.max_reels  || '5' }}
  TARGET_REELS_SCAN:       35
  MAX_RUNTIME_SECONDS:     2400
  SHUTDOWN_BUFFER_SECONDS: 60
  PLAYWRIGHT_HEADLESS:     "false"
  GEMINI_MODEL:            "gemini-2.0-flash"
  GEMINI_MAX_DIM:          720
  TELEGRAM_MAX_VIDEO_MB:   49
  DB_PATH:                 history.db
  DOWNLOAD_DIR:            /tmp/reels_downloads
  SCREENSHOT_DIR:          /tmp/reels_screenshots
  DISPLAY:                 ":99"
  WEB_PORT:                "8080"
  VIEWPORT_W:              "720"
  VIEWPORT_H:              "1280"
  PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: /usr/bin/chromium-browser
  TIKTOK_ENABLED:          ${{ github.event.inputs.tiktok_enabled || 'false' }}
  TIKTOK_HEADLESS:         "true"

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore history.db cache
        uses: actions/cache/restore@v4
        with:
          path: history.db
          key: reels-history-db-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            reels-history-db-

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          UBUNTU_VER=$(lsb_release -rs | cut -d. -f1)
          if [[ "$UBUNTU_VER" -ge 24 ]]; then
            ASOUND_PKG="libasound2t64"
          else
            ASOUND_PKG="libasound2"
          fi

          sudo apt-get install -y --no-install-recommends \
            xvfb fluxbox xterm dbus-x11 x11-xserver-utils x11-utils \
            ffmpeg \
            fonts-liberation fonts-noto fonts-noto-color-emoji \
            fonts-dejavu-core fonts-open-sans \
            fontconfig \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libdbus-1-3 libxcomposite1 libxdamage1 libxext6 libxfixes3 \
            libxrandr2 libgbm1 libxkbcommon0 libpango-1.0-0 \
            libpangocairo-1.0-0 libcairo2 "$ASOUND_PKG" libgtk-3-0 \
            libglib2.0-0 libx11-6 libx11-xcb1 libxcb1 libxss1 libxtst6 \
            procps curl wget ca-certificates lsb-release \
            gnupg \
            xdotool \
            xclip
          sudo fc-cache -fv

      - name: Install Chromium with H.264/AAC codecs
        run: |
          sudo apt-get install -y --no-install-recommends \
            chromium-browser \
            chromium-codecs-ffmpeg-extra \
            chromium-chromedriver
          chromium-browser --version

      - name: Start virtual desktop (Xpra HTML5)
        run: |
          # Install Xpra from official repo (replaces Xvfb + x11vnc + websockify + noVNC)
          # Walk a fallback list of codenames and do a real GET download as the
          # probe — no HEAD request at all.  xpra.org's CDN returns 200 for HEAD
          # but 404 for GET on the same URL, so HEAD-based probes give false
          # positives.  Attempting the actual download is the only reliable test.
          XPRA_CODENAME=$(lsb_release -cs)
          XPRA_REPO=""
          for _cn in "${XPRA_CODENAME}" noble jammy focal; do
            if curl -fsSL "https://xpra.org/repos/${_cn}/xpra.gpg" -o /tmp/xpra.gpg 2>/dev/null; then
              XPRA_REPO="${_cn}"
              break
            fi
          done
          if [ -z "${XPRA_REPO}" ]; then
            echo "ERROR: could not download xpra.gpg for any known codename" >&2
            exit 1
          fi
          echo "Xpra repo codename: ${XPRA_REPO} (runner is ${XPRA_CODENAME})"
          # /tmp/xpra.gpg already written by the successful loop iteration above
          sudo install -o root -g root -m 644 /tmp/xpra.gpg /usr/share/keyrings/xpra.gpg
          echo "deb [signed-by=/usr/share/keyrings/xpra.gpg] https://xpra.org/repos/${XPRA_REPO} ${XPRA_REPO} main" \
            | sudo tee /etc/apt/sources.list.d/xpra.list
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends xpra xpra-html5

          sudo mkdir -p /run/xpra
          sudo chmod 1777 /run/xpra

          xpra start-desktop "$DISPLAY" \
            --bind-tcp=0.0.0.0:${WEB_PORT} \
            --html=on \
            --start=fluxbox \
            --daemon=no \
            --pixel-depth=24 \
            --dpi=96 \
            --desktop-scaling=off \
            --opengl=no \
            --mdns=no \
            --notifications=no \
            --bell=no \
            --pulseaudio=no \
            --speaker=no \
            --microphone=off \
            --webcam=no \
            --clipboard=no \
            --file-transfer=no \
            --printing=no \
            > /tmp/xpra.log 2>&1 &

          # Wait for Xpra to be ready (up to 30s)
          for i in $(seq 1 30); do
            if xpra info "$DISPLAY" >/dev/null 2>&1; then
              echo "Xpra ready after ${i}s"
              break
            fi
            sleep 1
          done

          echo "Desktop ready -- http://localhost:${WEB_PORT}/"

      - name: Start Ngrok tunnel and notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          NGROK_AUTHTOKEN:    ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          curl -sSL https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz \
            | sudo tar -xz -C /usr/local/bin
          ngrok config add-authtoken "$NGROK_AUTHTOKEN"
          ngrok http ${WEB_PORT} --log=stdout --log-format=json \
            --request-header-add "ngrok-skip-browser-warning:true" > /tmp/ngrok.log 2>&1 &
          NGROK_PID=$!
          echo "Ngrok started (PID=$NGROK_PID)"

          python3 - << 'PYEOF'
          import time, json, os, urllib.request, sys

          TOKEN   = os.environ["TELEGRAM_BOT_TOKEN"]
          CHAT_ID = os.environ["TELEGRAM_CHAT_ID"]

          # Give ngrok a few seconds to establish the tunnel before polling
          time.sleep(5)

          url = None
          for attempt in range(60):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:4040/api/tunnels", timeout=3) as r:
                      d = json.load(r)
                      t = d.get("tunnels", [])
                      if t:
                          url = t[0]["public_url"]
                          break
              except Exception:
                  pass
              time.sleep(1)

          if not url:
              print("ERROR: Ngrok tunnel not found after 60s")
              try:
                  with open("/tmp/ngrok.log") as f:
                      print("=== ngrok log ===")
                      print(f.read()[-3000:])
              except Exception:
                  pass
              sys.exit(1)

          print(f"Tunnel ready: {url}")
          with open("/tmp/ngrok_url", "w") as f:
              f.write(url)

          text = (
              "Desktop Ready -- open in your browser:\n\n"
              f"{url}/\n\n"
              "No app needed -- just click the link above.\n\n"
              "Commands:\n"
              "/resume    -- start the Reels agent\n"
              "/newlink   -- get a fresh tunnel URL\n"
              "/desktop   -- open a terminal on screen\n"
          )

          data = json.dumps({"chat_id": CHAT_ID, "text": text}).encode()
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{TOKEN}/sendMessage",
              data=data, headers={"Content-Type": "application/json"}
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  result = json.load(r)
                  print("Telegram OK" if result.get("ok") else f"Telegram error: {result}")
          except Exception as e:
              print(f"Telegram send failed: {e}")
          PYEOF

      - name: Wait for Telegram commands
        if: ${{ github.event.inputs.pause_for_desktop == 'yes' }}
        env:
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          NGROK_AUTHTOKEN:           ${{ secrets.NGROK_AUTHTOKEN }}
          INSTAGRAM_SESSION_COOKIES: ${{ secrets.INSTAGRAM_SESSION_COOKIES }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os, json, time, subprocess, urllib.request, sys

          TOKEN    = os.environ["TELEGRAM_BOT_TOKEN"]
          CHAT_ID  = str(os.environ["TELEGRAM_CHAT_ID"]).strip()
          DISP     = os.environ.get("DISPLAY", ":99")
          WEB_PORT = os.environ.get("WEB_PORT", "8080")

          def tg_get(method, params=None):
              qs = "&".join(f"{k}={v}" for k, v in (params or {}).items())
              try:
                  with urllib.request.urlopen(
                      f"https://api.telegram.org/bot{TOKEN}/{method}?{qs}", timeout=15
                  ) as r:
                      return json.load(r)
              except Exception as e:
                  print(f"[tg_get error] {e}")
                  return {}

          def tg_send(text):
              data = json.dumps({"chat_id": CHAT_ID, "text": text}).encode()
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{TOKEN}/sendMessage",
                  data=data, headers={"Content-Type": "application/json"}
                )
              try:
                  with urllib.request.urlopen(req, timeout=10) as r:
                      return json.load(r)
              except Exception as e:
                  print(f"[tg_send error] {e}")

          def get_ngrok_url():
              try:
                  with open("/tmp/ngrok_url") as f:
                      return f.read().strip()
              except Exception:
                  pass
              try:
                  with urllib.request.urlopen("http://127.0.0.1:4040/api/tunnels", timeout=3) as r:
                      d = json.load(r)
                      t = d.get("tunnels", [])
                      if t:
                          return t[0]["public_url"]
              except Exception:
                  pass
              return None

          def restart_ngrok():
              subprocess.run(["pkill", "ngrok"], capture_output=True)
              time.sleep(2)
              subprocess.Popen(
                  ["ngrok", "http", WEB_PORT, "--log=stdout", "--log-format=json",
                   "--request-header-add", "ngrok-skip-browser-warning:true"],
                  stdout=open("/tmp/ngrok.log", "w"), stderr=subprocess.STDOUT
              )
              time.sleep(15)
              url = get_ngrok_url()
              if url:
                  with open("/tmp/ngrok_url", "w") as f:
                      f.write(url)
                  tg_send(f"New desktop link:\n\n{url}/\n\n/resume /newlink /desktop")
              else:
                  tg_send("Failed to restart Ngrok.")

          def cmd_desktop():
              env = os.environ.copy()
              env["DISPLAY"] = DISP
              subprocess.Popen(
                  ["xterm", "-fa", "Monospace", "-fs", "12"],
                  env=env,
                  stdout=open("/tmp/terminal.log", "w"),
                  stderr=subprocess.STDOUT,
              )
              tg_send(f"Terminal opened on display {DISP}")

          resp    = tg_get("getUpdates", {"limit": "1", "offset": "-1"})
          results = resp.get("result", [])
          offset  = (results[-1]["update_id"] + 1) if results else 0
          print(f"Polling from offset {offset}.")

          # تم تعديل النطاق إلى 60 دورة (5 دقائق تقريباً) لمنع تعليق خوادم GitHub Actions
          for i in range(60):
              resp    = tg_get("getUpdates", {"offset": str(offset), "limit": "10", "timeout": "4"})
              updates = resp.get("result", [])

              for upd in updates:
                  offset = upd["update_id"] + 1
                  msg    = upd.get("message", {})
                  text   = msg.get("text", "").strip()
                  cid    = str(msg.get("chat", {}).get("id", "")).strip()
                  if cid != CHAT_ID:
                      continue
                  print(f"  [cmd] {text!r}")

                  if text.startswith("/resume"):
                      tg_send("Resuming agent...")
                      sys.exit(0)
                  elif text.startswith("/newlink"):
                      tg_send("Restarting tunnel...")
                      restart_ngrok()
                  elif text.startswith("/desktop"):
                      cmd_desktop()

              time.sleep(5)

          print("Timeout reached -- continuing to run agent automatically.")
          PYEOF

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          sudo apt-get install -y --no-install-recommends \
            libwoff1 libopus0 libwebp7 libwebpdemux2 libenchant-2-2 \
            libgudev-1.0-0 libsecret-1-0 libhyphen0 libmanette-0.2-0 \
            libgles2 libgstreamer-gl1.0-0 libgstreamer-plugins-bad1.0-0 \
            gstreamer1.0-plugins-bad 2>/dev/null || true

      - name: Create runtime directories
        run: |
          mkdir -p /tmp/reels_downloads /tmp/reels_screenshots
          sudo mkdir -p /var/log/reels-hunter
          sudo chmod 777 /var/log/reels-hunter

      - name: Write cookies files
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
        run: |
          mkdir -p "$HOME/.secrets"

          # ── TikTok cookies ──────────────────────────────────────────────
          if [ -n "$TIKTOK_COOKIES" ]; then
            # Support both raw JSON/Netscape and base64-encoded formats
            if echo "$TIKTOK_COOKIES" | base64 -d 2>/dev/null | grep -q "tiktok"; then
              echo "$TIKTOK_COOKIES" | base64 -d > "$HOME/.secrets/tiktok_cookies.txt"
              echo "TikTok cookies written (base64 decoded)."
            else
              echo "$TIKTOK_COOKIES" > "$HOME/.secrets/tiktok_cookies.txt"
              echo "TikTok cookies written (raw)."
            fi
            chmod 600 "$HOME/.secrets/tiktok_cookies.txt"
          else
            echo "TIKTOK_COOKIES secret not set -- TikTok posting will use session auth or be skipped."
          fi

          # ── Gemini cookies ──────────────────────────────────────────────
          # Write to file so the agent can re-read them if needed
          if [ -n "$GEMINI_COOKIES" ]; then
            echo "$GEMINI_COOKIES" > "$HOME/.secrets/gemini_cookies.json"
            chmod 600 "$HOME/.secrets/gemini_cookies.json"
            echo "Gemini cookies written to $HOME/.secrets/gemini_cookies.json"
          else
            echo "GEMINI_COOKIES secret not set -- Gemini Web will be disabled."
          fi

      - name: Run Reels AI Hunter agent
        env:
          INSTAGRAM_SESSION_COOKIES: ${{ secrets.INSTAGRAM_SESSION_COOKIES }}
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          GEMINI_COOKIES:            ${{ secrets.GEMINI_COOKIES }}
          GEMINI_EMAIL:              ${{ secrets.GEMINI_EMAIL }}
          GEMINI_PASSWORD:           ${{ secrets.GEMINI_PASSWORD }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
          TIKTOK_SESSION_COOKIES:    ${{ secrets.TIKTOK_SESSION_COOKIES }}
          TIKTOK_COOKIES_FILE:       /home/runner/.secrets/tiktok_cookies.txt
          TIKTOK_EMAIL:              ${{ secrets.TIKTOK_EMAIL }}
          TIKTOK_PASSWORD:           ${{ secrets.TIKTOK_PASSWORD }}
          GH_TOKEN:                  ${{ secrets.GH_TOKEN || github.token }}
          B2_APPLICATION_KEY_ID:     ${{ secrets.B2_APPLICATION_KEY_ID }}
          B2_APPLICATION_KEY:        ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET_NAME:            ${{ secrets.B2_BUCKET_NAME }}
        run: |
          echo "DISPLAY=$DISPLAY"
          python3 app/agent.py 2>&1 | tee /var/log/reels-hunter/agent.log

      - name: Upload downloaded reels
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reels-downloads-${{ github.run_id }}
          path: /tmp/reels_downloads/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload screenshots and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reels-debug-${{ github.run_id }}
          path: |
            /tmp/reels_screenshots/
            /var/log/reels-hunter/
          retention-days: 7

      - name: Save history.db
        if: always()
        uses: actions/cache/save@v4
        with:
          path: history.db
          key: reels-history-db-${{ github.run_id }}-${{ github.run_attempt }}
